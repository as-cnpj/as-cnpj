name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate hub contents
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Validate shared vectors JSON
        run: node -e "JSON.parse(require('fs').readFileSync('vectors/cnpj.json', 'utf8')); JSON.parse(require('fs').readFileSync('catalog/repos-oficiais.json', 'utf8')); console.log('JSON files OK');"

      - name: Ensure internal artifacts are not public
        run: |
          test ! -d packages
          test ! -d scripts
          test ! -d docs/readme-mockups
          test ! -f docs/extracao-as-cnpj-js.md
          test ! -f package.json

      - name: Validate essential public files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f AUDIT.md
          test -f docs/manifesto-as-cnpj.md
          test -f docs/fontes-oficiais-e-regras.md
          test -f docs/arquitetura-e-migracao.md
