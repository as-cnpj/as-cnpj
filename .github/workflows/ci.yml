name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Syntax check
        run: |
          node --check packages/js-reference/src/cnpj.js
          node --check packages/js-reference/src/index.js

      - name: Run tests
        run: node packages/js-reference/test/run.js

      - name: Verify package contents
        run: |
          cd packages/js-reference
          npm pack --dry-run --json > pack-output.json
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('pack-output.json', 'utf8')); const files = data[0].files.map((file) => file.path); const forbidden = files.filter((path) => /^test\//.test(path) || /^docs\//.test(path) || /(^|\/)\.env(\..+)?$/.test(path) || /(^|\/)\.npmrc$/.test(path)); if (forbidden.length) { console.error('FAIL: forbidden files in package:', forbidden); process.exit(1); } console.log('Package contents OK:', files);"
